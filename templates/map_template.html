<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>路书 RoadBook - 轨迹地图</title>
    <link rel="icon" href="{{ static_base }}static/assets/favicon-48.png" type="image/png">
    {% if single_html %}
    <style id="inline-css">{{ css_content }}</style>
    {% else %}
    <link rel="stylesheet" href="{{ static_base }}static/common.css">
    <link rel="stylesheet" href="{{ static_base }}static/map.css">
    {% endif %}
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <div class="header">
        <div class="header-brand">
            <a href="/"><img src="{{ static_base }}static/assets/favicon-48.png" alt="icon" class="header-icon-img"></a>
            <a href="/"><h1>路书 <span class="title-en">RoadBook</span></h1></a>
                        <nav class="header-nav">
                <a href="/">首页</a>
                <a href="/photo-track">照片轨迹</a>
                <a href="/route">路径规划</a>
                <a href="/roadbook">AI路书</a>
                <a href="/help">使用说明</a>
            </nav>="header-nav">
                <a href="/">首页</a>
                <a href="/photo-track">照片轨迹</a>
                <a href="/route">路径规划</a>
                <a href="/roadbook">AI路书</a>
            </nav>
        </div>
        <div class="header-right">
            <div class="stats" id="stats">加载中...</div>
            <button class="header-btn" id="btnTripDetails" onclick="showTripDetails()">
                <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/></svg>
                行程详情
            </button>
            <button class="header-btn" id="btnOpenDataTable" onclick="showDataTable()">
                <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M3 3v18h18V3H3zm8 16H5v-6h6v6zm0-8H5V5h6v6zm8 8h-6v-6h6v6zm0-8h-6V5h6v6z"/></svg>
                数据表格
            </button>
            <button class="header-btn" id="btnOpenTimeline" onclick="openTimeline()">
                <svg viewBox="0 0 24 24" width="14" height="14"><path fill="currentColor" d="M23 8c0 1.1-.9 2-2 2a2 2 0 0 1-.18-.01C18.46 9.58 15.39 8 12 8c-3.39 0-6.46 1.58-8.82 3.99A2 2 0 0 1 3 10c0-1.1.9-2 2-2a2 2 0 0 1 .18.01C7.54 7.42 10.61 6 14 6c3.39 0 6.46 1.58 8.82 3.99A2 2 0 0 1 21 8z"/></svg>
                时间轴
            </button>
            <div id="map-styles" class="map-style-selector">
                <select id="styleSelect">
                    <option value="normal">标准</option>
                    <option value="dark">幻影黑</option>
                    <option value="light" selected>月光银</option>
                    <option value="whitesmoke">远山黛</option>
                    <option value="fresh">草色青</option>
                    <option value="grey">雅士灰</option>
                    <option value="graffiti">涂鸦</option>
                    <option value="macaron">马卡龙</option>
                    <option value="blue">靛青蓝</option>
                    <option value="darkblue">极夜蓝</option>
                    <option value="wine">酱籽</option>
                </select>
            </div>
            <button class="theme-toggle" id="btnThemeToggle" onclick="toggleTheme()" title="切换主题">
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"/>
                    <line x1="12" y1="1" x2="12" y2="3"/>
                    <line x1="12" y1="21" x2="12" y2="23"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="1" y1="12" x2="3" y2="12"/>
                    <line x1="21" y1="12" x2="23" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
            </button>
            <div class="header-github" id="headerGithub">
                <a href="https://github.com/zangnan/roadbook" target="_blank" title="GitHub">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12z"/>
                    </svg>
                </a>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <!-- 左侧地区介绍面板 -->
    <div class="left-panel" id="leftPanel">
        <div class="left-panel-header">
            <span id="leftPanelTitle">地点信息</span>
            <button class="left-panel-close" onclick="closeLeftPanel()">×</button>
        </div>
        <div class="left-panel-content" id="leftPanelContent">
            <!-- 动态内容 -->
        </div>
    </div>

    <!-- 右侧行程面板 -->
    <div class="right-panel common-panel common-panel-right" id="rightPanel">
        <div class="right-panel-header common-panel-header">
            <span>行程列表 (<span id="pointCount">0</span> 个地点)</span>
            <button class="right-panel-close common-panel-close" onclick="closeRightPanel()">×</button>
        </div>
        <div class="right-panel-list common-panel-body" id="itineraryList">
            <!-- 动态列表 -->
        </div>
    </div>

    <!-- 行程列表悬浮球 -->
    <div class="itinerary-float-btn floating-btn floating-btn-right" id="itineraryFloatBtn" onclick="showRightPanel()">
        <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/>
        </svg>
    </div>

    <!-- 行程详情面板 -->
    <div class="trip-details-panel common-panel common-panel-lg" id="tripDetailsPanel">
        <div class="trip-details-header common-panel-header">
            <span>行程详情</span>
            <button class="trip-details-close common-panel-close" onclick="closeTripDetails()">×</button>
        </div>
        <div class="trip-details-content" id="tripDetailsContent">
            <!-- 动态内容 -->
        </div>
    </div>

    <!-- 图例 -->
    <div class="legend common-panel common-panel-sm" id="legend">
        <div class="legend-header common-panel-header common-panel-header-flat">
            <span>图例</span>
            <button class="legend-close common-panel-close" onclick="closeLegend()">×</button>
        </div>
        <div class="legend-body common-panel-body" id="legendBody">
            <!-- 动态生成 -->
        </div>
    </div>

    <!-- 图例悬浮球 -->
    <div class="legend-float-btn floating-btn floating-btn-left" id="legendFloatBtn" onclick="showLegend()">
        <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
        </svg>
    </div>

    <!-- 轨迹回放控制栏 -->
    <div class="player-bar">
        <button class="player-btn player-btn-icon" id="btnAnimPlay" onclick="animToggle()" title="开始">
            <svg viewBox="0 0 24 24" width="18" height="18"><polygon points="5,3 19,12 5,21" fill="currentColor"/></svg>
        </button>
        <button class="player-btn player-btn-icon" id="btnAnimStop" onclick="animStop()" title="停止" disabled>
            <svg viewBox="0 0 24 24" width="16" height="16"><rect x="4" y="4" width="16" height="16" rx="2" fill="currentColor"/></svg>
        </button>
        <div class="player-progress" id="animProgressBar">
            <div class="player-progress-fill" id="animProgressFill"></div>
        </div>
        <div class="player-info" id="animInfo">
            <span id="animCounter">0/0</span>
            <span id="animPlace" class="anim-place"></span>
            <span id="animTime" class="anim-time"></span>
        </div>
        <div class="player-speed">
            <button class="speed-btn" data-speed="0.5" onclick="setAnimSpeed(0.5)">0.5x</button>
            <button class="speed-btn active" data-speed="1" onclick="setAnimSpeed(1)">1x</button>
            <button class="speed-btn" data-speed="2" onclick="setAnimSpeed(2)">2x</button>
            <button class="speed-btn" data-speed="4" onclick="setAnimSpeed(4)">4x</button>
        </div>
    </div>

    <!-- 照片预览 -->
    <div class="photo-overlay" id="photoOverlay" onclick="closePhotoPreview()"></div>
    <div class="photo-preview" id="photoPreview">
        <button class="photo-preview-close" onclick="closePhotoPreview()">×</button>
        <div class="preview-counter" id="previewCounter"></div>
        <div class="preview-main">
            <button class="preview-nav prev" id="btnPreviewPrev" onclick="previewPrev()">◀</button>
            <img id="previewImage" src="" alt="">
            <button class="preview-nav next" id="btnPreviewNext" onclick="previewNext()">▶</button>
        </div>
        <div class="preview-thumbnails" id="previewThumbnails"></div>
        <div class="preview-info">
            <h4 id="previewFilename"></h4>
            <p id="previewTime"></p>
        </div>
    </div>

    <!-- 加载状态 -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <p>地图加载中...</p>
    </div>

    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key={{ amap_ak }}"></script>
    <script>
        // 原始数据（来自 data_original.json）和治理后数据（来自 data_converted.json）
        let originalPoints = [];
        let unknownPoints = [];  // 无GPS照片数据
        let trackPoints = [];  // 治理后数据，用于显示

        let map, markers = [], polylines = [], infoWindow;

        // 主题状态

        // 检测桌面模式
        var isDesktop = new URLSearchParams(window.location.search).get('desktop') === '1';
        if (isDesktop) document.body.classList.add('desktop-mode');

        // 设置导航高亮
        (function() {
            const path = window.location.pathname;
            const navLinks = document.querySelectorAll('.header-nav a');
            navLinks.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === path) {
                    link.classList.add('active');
                }
            });
        })();

        // 显示页面跳转 loading
        function showPageLoading() {
            var loading = document.getElementById('page-loading');
            if (!loading) {
                loading = document.createElement('div');
                loading.id = 'page-loading';
                loading.innerHTML = '<div class="loading-spinner"></div><p>正在跳转...</p>';
                loading.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(15,23,42,0.85);display:flex;justify-content:center;align-items:center;flex-direction:column;z-index:99999;';
                var spinner = loading.querySelector('.loading-spinner');
                spinner.style.cssText = 'width:44px;height:44px;border:4px solid rgba(255,255,255,0.2);border-top-color:#00d4ff;border-radius:50%;animation:spin 0.8s linear infinite;';
                var text = loading.querySelector('p');
                text.style.cssText = 'color:#fff;margin-top:16px;font-size:14px;';
                var style = document.createElement('style');
                style.textContent = '@keyframes spin{to{transform:rotate(360deg)}}';
                document.head.appendChild(style);
                document.body.appendChild(loading);
            }
            loading.style.display = 'flex';
        }

        // 返回配置页面
        function goToConfig() {
            var configUrl = '/?desktop=1';
            console.log('Going to config:', configUrl);
            showPageLoading();
            window.location.href = configUrl;
        }

        // 打开时间轴
        function openTimeline() {
            var timelineUrl = 'timeline.html?desktop=1';
            console.log('Opening timeline:', timelineUrl);
            showPageLoading();
            window.location.href = timelineUrl;
        }

        // 主题切换功能
        function toggleTheme() {
            const body = document.body;
            const newTheme = body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        // 初始化主题
        function initTheme() {
            const saved = localStorage.getItem('theme') || 'dark';
            document.body.setAttribute('data-theme', saved);
        }

        // 轨迹回放动画状态
        let animMarker = null;        // 动画标记（小车）
        let animPath = [];           // 动画路径（所有点按顺序组成）
        let animPassedPath = [];     // 已走过的路径
        let animPassedPolyline = null; // 已走过路径的线
        let animState = 'idle';      // idle | running | paused | stopped
        let animDuration = 500;      // 每段动画时长（毫秒）
        let animSpeed = 1;           // 动画速度倍率
        let animPassedCount = 0;     // 已走过的地点数量

        // 10色循环调色板（深色系，避免红/黄色系）
        var static_base = '{{ static_base }}';
        {% if single_html %}
        var carIconBase64 = '{{ car_icon_base64 }}';
        {% endif %}
        const DAY_COLORS = [
            '#00897b', // 1 深青
            '#00acc1', // 2 青色
            '#1e88e5', // 3 蓝色
            '#3949ab', // 4 靛蓝
            '#8e24aa', // 5 紫色
            '#d81b60', // 6 深粉
            '#f4511e', // 7 深橙
            '#43a047', // 8 草绿
            '#00838f', // 9 深蓝绿
            '#6d4c41'  // 10 棕色
        ];

        function getDayColor(daySegment) {
            // 使用 daySegment-1 取模，确保循环
            return DAY_COLORS[(daySegment - 1) % DAY_COLORS.length];
        }

        // 异步加载外部 JSON 数据
        async function loadData() {
            console.log('loadData called');
            try {
                {% if single_html %}
                // 单一文件模式：使用内联数据
                originalPoints = JSON.parse('{{ original_points_json|safe }}');
                unknownPoints = JSON.parse('{{ unknown_points_json|safe }}');
                trackPoints = JSON.parse('{{ converted_points_json|safe }}');

                console.log(`原始数据: ${originalPoints.length} 条`);
                console.log(`未知位置数据: ${unknownPoints.length} 条`);
                console.log(`治理后数据: ${trackPoints.length} 条`);

                initMap();
                {% else %}
                const [originalRes, convertedRes, unknownRes] = await Promise.all([
                    fetch('data_original.json'),
                    fetch('data_converted.json'),
                    fetch('data_original_unknown.json').catch(() => ({ ok: false }))
                ]);

                if (!originalRes.ok || !convertedRes.ok) {
                    throw new Error('数据加载失败');
                }

                originalPoints = await originalRes.json();
                trackPoints = await convertedRes.json();
                unknownPoints = unknownRes.ok ? await unknownRes.json() : [];

                console.log(`原始数据: ${originalPoints.length} 条`);
                console.log(`未知位置数据: ${unknownPoints.length} 条`);
                console.log(`治理后数据: ${trackPoints.length} 条`);

                initMap();
                {% endif %}
            } catch (err) {
                console.error('数据加载错误:', err);
                document.getElementById('loading').innerHTML =
                    `<p style="color:#ff6b6b;">数据加载失败: ${err.message}<br>请确保 data_original.json 和 data_converted.json 文件存在</p>`;
            }
        }

        function initMap() {
            if (trackPoints.length === 0) {
                document.getElementById('loading').innerHTML = '<p>未找到有效轨迹点</p>';
                return;
            }

            map = new AMap.Map('map', {
                zoom: 10,
                center: [trackPoints[0].longitude_tran, trackPoints[0].latitude_tran],
                resizeEnable: true,
                mapStyle: "amap://styles/light"
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('stats').textContent =
                `共 ${trackPoints.length} 个轨迹点 | 点击播放按钮开始轨迹回放`;
            document.getElementById('pointCount').textContent = trackPoints.length;
            document.getElementById('animCounter').textContent = `0/${trackPoints.length}`;

            // 渲染轨迹线
            renderPolyline();

            // 渲染标记点
            renderMarkers();

            // 渲染行程列表
            renderItineraryList();

            // 创建信息窗体
            infoWindow = new AMap.InfoWindow({
                isCustom: false,
                content: '',
                offset: new AMap.Pixel(0, -30)
            });

            // 自动调整视野，为顶部header(60px)、右侧面板(280px)、底部播放器(80px)、左侧面板(300px)预留空间
            setTimeout(() => map.setFitView(null, false, [60, 280, 80, 300]), 500);

            // 渲染动态图例
            renderLegend();

            // 初始化轨迹回放动画
            initAnimation();

            // 绑定地图主题切换事件
            document.getElementById('styleSelect').onchange = setMapStyle;

            // 初始化海拔图表
            initAltitudeChart();
        }

        function setMapStyle() {
            var styleName = "amap://styles/" + this.value;
            map.setMapStyle(styleName);
        }

        function renderLegend() {
            const legend = document.getElementById('legend');
            if (!legend || trackPoints.length === 0) return;

            // 收集所有不同的 day_segment，并找到每个 segment 的第一张照片的日期
            const daySegmentMap = {};  // { day_segment: first_photo_timestamp }
            trackPoints.forEach(p => {
                const day = p.day_segment || 1;
                if (!daySegmentMap[day]) {
                    // 找到该 segment 的第一张照片
                    const firstPhoto = p.photo && p.photo[0];
                    if (firstPhoto && firstPhoto.timestamp) {
                        daySegmentMap[day] = firstPhoto.timestamp;
                    }
                }
            });

            // 构建 day_segment → first_point_index 映射
            const daySegmentFirstIndex = {};  // { day_segment: first_point_index }
            trackPoints.forEach((p, idx) => {
                const day = p.day_segment || 1;
                if (daySegmentFirstIndex[day] === undefined) {
                    daySegmentFirstIndex[day] = idx;  // 记录该天第一个点的索引
                }
            });

            const days = Object.keys(daySegmentMap).map(Number).sort((a, b) => a - b);

            // 格式化日期为 YYYY-MM-DD
            function formatDate(timestamp) {
                if (!timestamp) return '';
                const d = new Date(timestamp);
                const year = d.getFullYear();
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const day = String(d.getDate()).padStart(2, '0');
                return `${year}-${month}-${day}`;
            }

            let html = '';

            // 起点（使用第一天的颜色作为起点颜色）
            const startColor = getDayColor(days[0] || 1);
            html += `<div class="legend-item" data-index="0">
                <span class="legend-dot" style="background:${startColor}; box-shadow: 0 0 8px ${startColor}88;"></span>
                <span class="legend-text">起点</span>
            </div>`;

            // 每天：显示该段第一张照片的日期
            days.forEach(day => {
                const color = getDayColor(day);
                const dateStr = formatDate(daySegmentMap[day]);
                const dayLabel = dateStr || `第${day}天`;
                const firstIndex = daySegmentFirstIndex[day];
                html += `<div class="legend-item" data-index="${firstIndex}">
                    <span class="legend-dot" style="background:${color}; box-shadow: 0 0 8px ${color}88;"></span>
                    <span class="legend-text">${dayLabel}</span>
                </div>`;
            });

            // 终点（使用最后一天的颜色）
            const endColor = getDayColor(days[days.length - 1] || 1);
            html += `<div class="legend-item" data-index="${trackPoints.length - 1}">
                <span class="legend-dot" style="background:${endColor}; box-shadow: 0 0 8px ${endColor}88;"></span>
                <span class="legend-text">终点</span>
            </div>`;

            document.getElementById('legendBody').innerHTML = html;

            // 绑定点击事件
            document.getElementById('legendBody').querySelectorAll('.legend-item').forEach(item => {
                item.style.cursor = 'pointer';
                item.onclick = () => {
                    const idx = parseInt(item.dataset.index);
                    if (!isNaN(idx)) goToPoint(idx);
                };
            });
        }

        function renderPolyline() {
            // 清除旧的多段线
            if (polylines.length > 0) {
                map.remove(polylines);
                polylines = [];
            }

            // 按 day_segment 分组点
            const daySegments = {};
            trackPoints.forEach((point, index) => {
                const day = point.day_segment || 1;
                if (!daySegments[day]) {
                    daySegments[day] = [];
                }
                daySegments[day].push({ ...point, index });
            });

            const days = Object.keys(daySegments).map(Number).sort((a, b) => a - b);

            // 第一步：为每一天绘制当天的轨迹路径（如果该天有2个及以上点）
            days.forEach((day) => {
                const points = daySegments[day];
                if (points.length < 2) {
                    // 只有1个点，无法绘制路径，跳过
                    return;
                }

                const path = points.map(p => [p.longitude_tran, p.latitude_tran]);
                const color = getDayColor(day);

                const polyline = new AMap.Polyline({
                    path: path,
                    strokeColor: color,
                    strokeWeight: 5,
                    strokeOpacity: 0.9,
                    lineJoin: 'round',
                    lineCap: 'round',
                    isOutline: false,
                    borderWeight: 0
                });
                // 添加鼠标悬停效果
                polyline.on('mouseover', function() {
                    this.setOptions({ strokeWeight: 8, strokeOpacity: 1 });
                });
                polyline.on('mouseout', function() {
                    this.setOptions({ strokeWeight: 5, strokeOpacity: 0.9 });
                });
                map.add(polyline);
                polylines.push(polyline);
            });

            // 第二步：绘制相邻天之间的连接线（使用后一天的颜色，保证路线视觉连贯）
            for (let i = 0; i < days.length - 1; i++) {
                const currDay = days[i];
                const nextDay = days[i + 1];
                const currPoints = daySegments[currDay];
                const nextPoints = daySegments[nextDay];

                if (!currPoints || !nextPoints || currPoints.length === 0 || nextPoints.length === 0) {
                    continue;
                }

                // 使用下一天的颜色
                const nextColor = getDayColor(nextDay);

                // 从当前天最后一点到下一天第一点
                const lastPoint = currPoints[currPoints.length - 1];
                const firstPoint = nextPoints[0];

                const connectPath = [
                    [lastPoint.longitude_tran, lastPoint.latitude_tran],
                    [firstPoint.longitude_tran, firstPoint.latitude_tran]
                ];

                const connectPolyline = new AMap.Polyline({
                    path: connectPath,
                    strokeColor: nextColor,
                    strokeWeight: 4,
                    strokeOpacity: 0.8,
                    lineJoin: 'round'
                });
                map.add(connectPolyline);
                polylines.push(connectPolyline);
            }
        }

        // ========== 轨迹回放动画 ==========

        // 初始化动画（加载插件后调用）
        function initAnimation() {
            // 加载 MoveAnimation 插件
            AMap.plugin('AMap.MoveAnimation', function() {
                if (trackPoints.length === 0) return;

                // 构建完整的动画路径
                animPath = trackPoints.map(p => [p.longitude_tran, p.latitude_tran]);

                // 已走过路径初始为起点
                animPassedPath = [animPath[0]];

                // 创建已走过路径的线 - 带发光效果
                animPassedPolyline = new AMap.Polyline({
                    map: map,
                    strokeColor: '#667eea',
                    strokeWeight: 7,
                    strokeOpacity: 0.9,
                    lineJoin: 'round',
                    lineCap: 'round'
                });

                // 创建小车标记
                animMarker = new AMap.Marker({
                    map: map,
                    position: animPath[0],
                    {% if single_html %}
                    icon: new AMap.Icon({
                        size: new AMap.Size(26, 52),
                        image: carIconBase64,
                        imageSize: new AMap.Size(26, 52)
                    }),
                    {% else %}
                    icon: static_base + 'static/assets/car.png',
                    {% endif %}
                    offset: new AMap.Pixel(-13, -26)
                });

                // 小车标签已禁用，避免卡顿
                // animMarker.setLabel({ ... });

                // 初始化进度显示
                animPassedCount = 1;
                document.getElementById('animCounter').textContent = `1/${animPath.length}`;
                updateAnimInfo();

                // 监听移动事件，更新已走过路径
                animMarker.on('moving', function(e) {
                    animPassedPolyline.setPath(e.passedPath);
                    // 更新进度
                    animPassedCount = e.passedPath.length;
                    const progress = animPassedCount / animPath.length * 100;
                    document.getElementById('animProgressFill').style.width = progress + '%';
                    document.getElementById('animCounter').textContent = `${animPassedCount}/${animPath.length}`;
                    updateAnimInfo();
                });

                // 监听动画结束
                animMarker.on('complete', function() {
                    animState = 'idle';
                    animPassedCount = animPath.length;
                    document.getElementById('animCounter').textContent = `${animPassedCount}/${animPath.length}`;
                    updateAnimInfo();
                    document.getElementById('animProgressFill').style.width = '100%';
                    updateAnimButtonState();
                });
            });
        }

        // 切换播放/暂停
        function animToggle() {
            if (animState === 'idle' || animState === 'stopped') {
                animStart();
            } else if (animState === 'running') {
                animPause();
            } else if (animState === 'paused') {
                animResume();
            }
        }

        // 开始动画
        function animStart() {
            if (animPath.length < 2) return;

            // 重置已走过路径
            animPassedCount = 1;
            animPassedPath = [animPath[0]];
            animMarker.setPosition(animPath[0]);
            animPassedPolyline.setPath(animPassedPath);
            document.getElementById('animProgressFill').style.width = '0%';
            document.getElementById('animCounter').textContent = `${animPassedCount}/${animPath.length}`;
            updateAnimInfo();

            animState = 'running';
            updateAnimButtonState();

            animMarker.moveAlong(animPath, {
                duration: animDuration / animSpeed,
                autoRotation: true
            });
        }

        // 暂停动画
        function animPause() {
            if (animState !== 'running') return;
            animMarker.pauseMove();
            animState = 'paused';
            updateAnimButtonState();
        }

        // 继续动画
        function animResume() {
            if (animState !== 'paused') return;
            animMarker.resumeMove();
            animState = 'running';
            updateAnimButtonState();
        }

        // 停止动画
        function animStop() {
            animMarker.stopMove();

            // 重置到起点
            animPassedCount = 1;
            animPassedPath = [animPath[0]];
            animMarker.setPosition(animPath[0]);
            animPassedPolyline.setPath(animPassedPath);

            document.getElementById('animProgressFill').style.width = '0%';
            document.getElementById('animCounter').textContent = `${animPassedCount}/${animPath.length}`;
            document.getElementById('animPlace').textContent = '';
            document.getElementById('animTime').textContent = '';

            animState = 'idle';
            updateAnimButtonState();
        }

        // 更新动画叠加信息显示
        function updateAnimInfo() {
            const idx = animPassedCount - 1;
            const point = trackPoints[idx];
            if (!point) return;

            // 更新计数
            document.getElementById('animCounter').textContent = `${animPassedCount}/${animPath.length}`;

            // 更新地点名称
            const placeEl = document.getElementById('animPlace');
            const placeName = point.place_name || '';
            if (placeName) {
                placeEl.textContent = placeName;
            } else {
                placeEl.textContent = '';
            }

            // 更新标签
            const labelText = document.getElementById('animLabelText');
            if (labelText) {
                labelText.textContent = placeName || `位置 ${animPassedCount}`;
            }

            // 更新时间
            const timeEl = document.getElementById('animTime');
            if (point.photo && point.photo[0] && point.photo[0].timestamp) {
                const time = new Date(point.photo[0].timestamp);
                timeEl.textContent = time.toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            } else {
                timeEl.textContent = '';
            }
        }

        // 设置动画速度
        function setAnimSpeed(speed) {
            animSpeed = speed;
            // 更新按钮样式
            document.querySelectorAll('.player-speed .speed-btn').forEach(btn => {
                btn.classList.toggle('active', parseFloat(btn.dataset.speed) === speed);
            });
            // 如果正在播放，重新设置速度
            if (animState === 'running') {

                animMarker.stopMove();
                animMarker.moveAlong(animPath, {
                    duration: animDuration / animSpeed,
                    autoRotation: true
                });
            }
        }

        // 更新按钮状态
        function updateAnimButtonState() {
            const btnPlay = document.getElementById('btnAnimPlay');
            const btnStop = document.getElementById('btnAnimStop');

            btnStop.disabled = animState === 'idle';

            if (animState === 'running') {
                btnPlay.innerHTML = '<svg viewBox="0 0 24 24" width="20" height="20"><rect x="6" y="4" width="4" height="16" rx="1" fill="currentColor"/><rect x="14" y="4" width="4" height="16" rx="1" fill="currentColor"/></svg>';
                btnPlay.title = '暂停';
                btnPlay.classList.add('playing');
            } else {
                btnPlay.innerHTML = '<svg viewBox="0 0 24 24" width="20" height="20"><polygon points="5,3 19,12 5,21" fill="currentColor"/></svg>';
                btnPlay.title = '开始';
                btnPlay.classList.remove('playing');
            }
        }

        function renderMarkers() {
            // 收集所有不同的 day_segment
            const days = [...new Set(trackPoints.map(p => p.day_segment || 1))];

            // 创建起点和终点图标
            {% if single_html %}
            var dirMarkerBase64 = '{{ dir_marker_base64 }}';
            {% else %}
            var dirMarkerBase64 = static_base + 'static/assets/dir-marker.png';
            {% endif %}

            var startIcon = new AMap.Icon({
                size: new AMap.Size(25, 34),
                image: dirMarkerBase64,
                imageSize: new AMap.Size(135, 40),
                imageOffset: new AMap.Pixel(-9, -3)  // 起点在合图中左起第2个
            });

            var endIcon = new AMap.Icon({
                size: new AMap.Size(25, 34),
                image: dirMarkerBase64,
                imageSize: new AMap.Size(135, 40),
                imageOffset: new AMap.Pixel(-95, -3)  // 终点在合图中右起第2个
            });

            trackPoints.forEach((point, index) => {
                const isStart = index === 0;
                const isEnd = index === trackPoints.length - 1;
                const day = point.day_segment || 1;

                // 途经点根据日期颜色，起点/终点使用图标
                const color = getDayColor(day);

                let marker;
                if (isStart) {
                    // 起点使用高德官方图标 + 发光效果
                    marker = new AMap.Marker({
                        position: [point.longitude_tran, point.latitude_tran],
                        title: point.place_name || point.filename,
                        extData: { index, point },
                        icon: startIcon,
                        offset: new AMap.Pixel(-13, -30),
                        className: 'start-end-marker'
                    });
                } else if (isEnd) {
                    // 终点使用高德官方图标 + 发光效果
                    marker = new AMap.Marker({
                        position: [point.longitude_tran, point.latitude_tran],
                        title: point.place_name || point.filename,
                        extData: { index, point },
                        icon: endIcon,
                        offset: new AMap.Pixel(-13, -30),
                        className: 'start-end-marker breathe-animation'
                    });
                } else {
                    // 途经点使用 CSS 圆形样式 + 发光效果
                    const markerContent = document.createElement('div');
                    markerContent.style.cssText = `
                        width: 16px;
                        height: 16px;
                        border-radius: 50%;
                        background: ${color};
                        border: 2px solid rgba(255,255,255,0.9);
                        box-shadow: 0 0 12px ${color}80, 0 2px 6px rgba(0,0,0,0.3);
                        transition: all 0.3s ease;
                    `;
                    markerContent.className = 'waypoint-marker';

                    marker = new AMap.Marker({
                        position: [point.longitude_tran, point.latitude_tran],
                        title: point.place_name || point.filename,
                        extData: { index, point },
                        content: markerContent,
                        offset: new AMap.Pixel(-8, -8)
                    });

                    // 途经点hover效果
                    marker.on('mouseover', function() {
                        this.getContent().style.transform = 'scale(1.4)';
                        this.getContent().style.boxShadow = `0 0 20px ${color}, 0 0 30px ${color}`;
                    });
                    marker.on('mouseout', function() {
                        this.getContent().style.transform = 'scale(1)';
                        this.getContent().style.boxShadow = `0 0 12px ${color}80, 0 2px 6px rgba(0,0,0,0.3)`;
                    });
                }

                marker.on('click', () => {
                    showPointInfo(index);
                    showLeftPanel(index);
                });

                map.add(marker);
                markers.push(marker);
            });
        }

                item.dataset.index = index;

                const photo = point.photo && point.photo[0];
                const timeStr = photo && photo.timestamp
                    ? new Date(photo.timestamp).toLocaleString('zh-CN', {
                        month: 'numeric', day: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                      })
                    : '未知时间';

                const admin = point.administrative || {};
                const region = `${admin.province || ''}${admin.city || ''}${admin.district || ''}`.replace(/^$/, '');

                const day = point.day_segment || 1;

        // 在 loadData 成功后调用
        function initAltitudeChart() {
            console.log('initAltitudeChart called');
            // 先绑定浮层点击事件（在浮层显示之前）
            initFloatingPanelEvents();

            const altitudes = originalPoints
                .map(p => p.altitude)
                .filter(a => a !== null && a !== undefined);

            if (altitudes.length === 0) {
                // 没有海拔数据时不显示浮窗入口

        // 渲染海拔图表（根据当前模式）
        function renderAltitudeChart() {
            // 准备数据
            const data = [];
            const labels = [];
            const dateIndices = [];  // 记录每个数据点的原始索引

            // 只保留有有效海拔数据的点（altitude > 0）
            const altitudePoints = originalPoints.filter(
                p => p.altitude !== null && p.altitude !== undefined && p.altitude > 0
            );

            if (altitudePoints.length === 0) return;

            // 获取所有唯一日期并排序
            const dateSet = new Set();
            const dateToIndices = {};  // 日期到数据点索引的映射
            altitudePoints.forEach((p, i) => {
                const dateStr = p.timestamp ? p.timestamp.split('T')[0] : '';
                if (dateStr) {
                    dateSet.add(dateStr);
                    if (!dateToIndices[dateStr]) dateToIndices[dateStr] = [];
                    dateToIndices[dateStr].push(i);
                }
            });
            const uniqueDates = Array.from(dateSet).sort();

            if (altitudeDisplayMode === 'day') {
                // 按天模式：取当天最高海拔
                const maxLabels = 10;
                let dateStep = 1;
                if (uniqueDates.length > maxLabels) {
                    dateStep = Math.ceil(uniqueDates.length / maxLabels);
                }

                uniqueDates.forEach((date, dateIdx) => {
                    // 显示标签（按采样间隔）
                    if (dateIdx % dateStep === 0) {
                        labels.push(date);
                    } else {
                        labels.push('');
                    }
                    // 取该日期最高海拔的点
                    const indices = dateToIndices[date];
                    let maxAlt = -Infinity;
                    let maxIdx = indices[0];
                    indices.forEach(idx => {
                        const alt = altitudePoints[idx].altitude;
                        if (alt > maxAlt) {
                            maxAlt = alt;
                            maxIdx = idx;
                        }
                    });
                    data.push(maxAlt);
                    dateIndices.push(maxIdx);
                });
            } else {
                // 按坐标点模式：显示所有点
                altitudePoints.forEach((p, i) => {
                    const dateStr = p.timestamp ? p.timestamp.split('T')[0] : '';
                    const time = new Date(p.timestamp);
                    const timeStr = time.getHours() + ':' + String(time.getMinutes()).padStart(2, '0');
                    if (uniqueDates.length === 1) {
                        // 单天：只显示时间
                        labels.push(timeStr);
                    } else {
                        // 多天：显示日期+时间
                        labels.push(dateStr + ' ' + timeStr);
                    }
                    data.push(p.altitude);
                    dateIndices.push(i);
                });
            }

            const option = {
                backgroundColor: 'transparent',
                tooltip: {
                    trigger: 'axis',
                    formatter: function(params) {
                        const idx = dateIndices[params[0].dataIndex];
                        const point = originalPoints[idx];
                        let html = `位置 #${idx + 1}<br/>海拔: ${params[0].value} 米`;
                        if (point && point.timestamp) {
                            const date = new Date(point.timestamp);
                            html += `<br/>时间: ${date.toLocaleString('zh-CN')}`;
                        }
                        if (point && point.place_name) {
                            html += `<br/>地点: ${point.place_name}`;
                        }
                        return html;
                    }
                },
                grid: {
                    top: 30,
                    bottom: 40,
                    left: 70,
                    right: 20
                },
                xAxis: {
                    type: 'category',
                    data: labels,
                    axisLine: { lineStyle: { color: '#666' } },
                    axisLabel: {
                        color: '#aaa',
                        fontSize: 10,
                        rotate: 0  // 水平显示
                    }
                },
                yAxis: {
                    type: 'value',
                    axisLine: { lineStyle: { color: '#666' } },
                    axisLabel: { color: '#aaa', formatter: '{value} m' },
                    splitLine: { lineStyle: { color: '#333' } }
                },
                series: [{
                    data: data,
                    type: 'line',
                    smooth: true,
                    symbol: 'circle',
                    symbolSize: 6,
                    lineStyle: { color: '#667eea', width: 2 },
                    itemStyle: { color: '#667eea' },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(102, 126, 234, 0.5)' },
                            { offset: 1, color: 'rgba(102, 126, 234, 0.1)' }
                        ])
                    }
                }]
            };

            altitudeChart.setOption(option);

            // 点击图表跳转到对应位置
            altitudeChart.off('click'); // 移除之前的绑定
            altitudeChart.on('click', function(params) {
                const idx = params.dataIndex;
                // 找到对应的 originalPoints
                let count = 0;
                for (let i = 0; i < originalPoints.length; i++) {
                    if (originalPoints[i].altitude !== null && originalPoints[i].altitude !== undefined) {
                        if (count === idx) {
                            // 找到对应点，跳转到地图位置
                            const lng = originalPoints[i].longitude;
                            const lat = originalPoints[i].latitude;
                            if (lng && lat) {
                                map.setCenter([lng, lat]);
                                map.setZoom(14);
                            }
                            // 同时打开左侧面板显示该点信息
                            showLeftPanel(i);
                            break;
                        }
                        count++;
                    }
                }
            });
        }

        // 照片预览状态
        let previewPhotos = [];  // 当前坐标点的所有照片
        let previewIndex = 0;    // 当前预览的照片索引
        let previewPointIndex = -1;  // 当前预览的坐标点索引

        function showPhotoPreview(pointIndex, photoIndex) {
            const point = trackPoints[pointIndex];
            if (!point || !point.photo || point.photo.length === 0) return;

            previewPhotos = point.photo;
            previewIndex = photoIndex;
            previewPointIndex = pointIndex;

            renderPreviewPhoto();
            renderPreviewThumbnails();

            document.getElementById('photoPreview').classList.add('active');
            document.getElementById('photoOverlay').classList.add('active');

            // 禁用地图键盘控制，防止左右键移动地图
            try {
                map.setStatus({ keyboardEnable: false });
            } catch(e) {}
        }

        function renderPreviewPhoto() {
            const photo = previewPhotos[previewIndex];
            if (!photo) return;

            // 使用原图文件路径
            const imgSrc = photo.original_path || photo.thumbnail_path || '';

            document.getElementById('previewImage').src = imgSrc;
            document.getElementById('previewFilename').textContent = photo.filename || '';
            document.getElementById('previewTime').textContent = photo.timestamp
                ? new Date(photo.timestamp).toLocaleString('zh-CN')
                : '';
            document.getElementById('previewCounter').textContent = `${previewIndex + 1} / ${previewPhotos.length}`;

            // 更新导航按钮状态
            document.getElementById('btnPreviewPrev').disabled = previewIndex <= 0;
            document.getElementById('btnPreviewNext').disabled = previewIndex >= previewPhotos.length - 1;
        }

        function renderPreviewThumbnails() {
            const container = document.getElementById('previewThumbnails');
            container.innerHTML = '';

            previewPhotos.forEach((photo, idx) => {
                const thumb = document.createElement('div');
                thumb.className = `preview-thumb ${idx === previewIndex ? 'active' : ''}`;
                const imgSrc = photo.thumbnail_path || '';
                thumb.innerHTML = `<img src="${imgSrc}" alt="">`;
                thumb.onclick = () => {
                    previewIndex = idx;
                    renderPreviewPhoto();
                    renderPreviewThumbnails();
                };
                container.appendChild(thumb);
            });
        }

        function previewPrev() {
            if (previewIndex > 0) {
                previewIndex--;
                renderPreviewPhoto();
                renderPreviewThumbnails();
            }
        }

        function previewNext() {
            if (previewIndex < previewPhotos.length - 1) {
                previewIndex++;
                renderPreviewPhoto();
                renderPreviewThumbnails();
            }
        }

        function closePhotoPreview() {
            document.getElementById('photoPreview').classList.remove('active');
            document.getElementById('photoOverlay').classList.remove('active');
            previewPhotos = [];
            previewIndex = 0;
            previewPointIndex = -1;

            // 恢复地图键盘控制
            try {
                map.setStatus({ keyboardEnable: true });
            } catch(e) {}
        }

        // ========== 行程详情面板 ==========

        // Haversine 公式计算两点间距离（公里）
        function haversineDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // 地球半径(km)
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function showTripDetails() {
            if (trackPoints.length === 0) return;

            const start = trackPoints[0];
            const end = trackPoints[trackPoints.length - 1];

            // 格式化行政区名称
            function formatAdmin(admin) {
                if (!admin) return '';
                return `${admin.province || ''}${admin.city || ''}${admin.district || ''}`.replace(/^$/, '');
            }

            // 清理地点名称（去掉 "(X张)" 后缀）
            function cleanPlaceName(name) {
                if (!name) return '';
                return name.replace(/\s*\(\d+张\)\s*$/, '').trim();
            }

            // 起点/终点名称
            const startName = cleanPlaceName(start.place_name) || (start.photo && start.photo[0] && start.photo[0].filename) || '未知';
            const endName = cleanPlaceName(end.place_name) || (end.photo && end.photo[0] && end.photo[0].filename) || '未知';
            const startAdmin = formatAdmin(start.administrative);
            const endAdmin = formatAdmin(end.administrative);

            // 计算总里程
            let totalDistance = 0;
            for (let i = 0; i < trackPoints.length - 1; i++) {
                const p1 = trackPoints[i];
                const p2 = trackPoints[i + 1];
                totalDistance += haversineDistance(p1.latitude_tran, p1.longitude_tran, p2.latitude_tran, p2.longitude_tran);
            }

            // 计算用时（与时间轴页面一致：统计实际有照片的日期数）
            // 收集所有照片的唯一日期
            const photoDates = new Set();
            for (const p of trackPoints) {
                const photos = p.photo || [];
                for (const photo of photos) {
                    if (photo.timestamp) {
                        const d = new Date(photo.timestamp);
                        if (!isNaN(d.getTime())) {
                            photoDates.add(d.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit' }));
                        }
                    }
                }
            }
            let durationText = '未知';
            if (photoDates.size > 0) {
                const sortedDates = Array.from(photoDates).sort((a, b) => new Date(a) - new Date(b));
                const startDateStr = sortedDates[0];
                const endDateStr = sortedDates[sortedDates.length - 1];
                durationText = `${sortedDates.length}天 (${startDateStr} ~ ${endDateStr})`;
            }

            const distanceText = totalDistance < 1
                ? `${(totalDistance * 1000).toFixed(0)} 米`
                : `${Math.round(totalDistance)} 公里`;

            // 计算海拔统计（从 originalPoints 获取）
            let minAltitude = null, maxAltitude = null;
            if (originalPoints.length > 0) {
                const altitudes = originalPoints
                    .map(p => p.altitude)
                    .filter(a => a !== null && a !== undefined);
                if (altitudes.length > 0) {
                    // 过滤掉 altitude <= 0 的无效数据，与时间轴页面一致
                    const validAltitudes = altitudes.filter(a => a > 0);
                    if (validAltitudes.length > 0) {
                        minAltitude = Math.min(...validAltitudes);
                        maxAltitude = Math.max(...validAltitudes);
                    }
                }
            }

            const altitudeInfo = minAltitude !== null
                ? `<div class="trip-details-item">
                        <div class="trip-details-label">海拔范围</div>
                        <div class="trip-details-value">${minAltitude.toFixed(0)} ~ ${maxAltitude.toFixed(0)} 米</div>
                   </div>`
                : '';

            const content = document.getElementById('tripDetailsContent');
            content.innerHTML = `
                <div class="trip-details-item">
                    <div class="trip-details-label">起点</div>
                    <div class="trip-details-value">${startName}${startAdmin ? ' <span style="color:#999;">' + startAdmin + '</span>' : ''}</div>
                </div>
                <div class="trip-details-item">
                    <div class="trip-details-label">终点</div>
                    <div class="trip-details-value">${endName}${endAdmin ? ' <span style="color:#999;">' + endAdmin + '</span>' : ''}</div>
                </div>
                <div class="trip-details-item">
                    <div class="trip-details-label">总里程</div>
                    <div class="trip-details-value">${distanceText}</div>
                </div>
                <div class="trip-details-item">
                    <div class="trip-details-label">用时</div>
                    <div class="trip-details-value">${durationText}</div>
                </div>
                <div class="trip-details-item">
                    <div class="trip-details-label">照片数</div>
                    <div class="trip-details-value">${originalPoints.length} 张</div>
                </div>
                ${altitudeInfo}
            `;

            document.getElementById('tripDetailsPanel').style.display = 'flex';
            // document.getElementById('btnTripDetails').style.display = 'none';
        }

        function closeTripDetails() {
            document.getElementById('tripDetailsPanel').style.display = 'none';
            document.getElementById('btnTripDetails').style.display = '';
        }

        // ========== 数据表格面板 ==========

        let currentTableType = 'original';

        function showDataTable() {
            document.getElementById('dataTablePanel').classList.add('active');
            // 默认显示原始数据表格
            switchTable('original');
        }

        function closeDataTable() {
            document.getElementById('dataTablePanel').classList.remove('active');
        }

        function switchTable(type) {
            currentTableType = type;
            // 更新标签状态
            document.querySelectorAll('.table-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.type === type);
            });
            // 渲染表格
            renderTable(type);
        }

        function renderTable(type) {
            const container = document.getElementById('dataTableContent');
            let html = '';

            if (type === 'original') {
                html = renderOriginalTable();
            } else if (type === 'unknown') {
                html = renderUnknownTable();
            } else if (type === 'converted') {
                html = renderConvertedTable();
            }

            container.innerHTML = html;
        }

        function renderOriginalTable() {
            if (!originalPoints || originalPoints.length === 0) {
                return '<div class="table-empty">暂无数据</div>';
            }

            let rows = originalPoints.map((p, idx) => {
                const timestamp = p.timestamp ? new Date(p.timestamp).toLocaleString('zh-CN') : '-';
                const lat = p.latitude ? p.latitude.toFixed(5) : '-';
                const lng = p.longitude ? p.longitude.toFixed(5) : '-';
                const alt = p.altitude ? p.altitude.toFixed(1) + 'm' : '-';
                const place = p.place_name || '-';
                const address = p.address || '-';
                const admin = p.administrative ? `${p.administrative.province || ''}${p.administrative.city || ''}${p.administrative.district || ''}` : '-';

                return `<tr onclick="highlightPoint(${idx})">
                    <td>${idx + 1}</td>
                    <td><img src="${p.thumbnail_path || ''}" class="table-thumb" onerror="this.style.display='none'"></td>
                    <td>${p.filename || '-'}</td>
                    <td>${timestamp}</td>
                    <td>${place}</td>
                    <td>${address}</td>
                    <td>${admin}</td>
                    <td>${lat}</td>
                    <td>${lng}</td>
                    <td>${alt}</td>
                </tr>`;
            }).join('');

            return `<table class="data-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>缩略图</th>
                        <th>文件名</th>
                        <th>拍摄时间</th>
                        <th>地点</th>
                        <th>地址</th>
                        <th>行政区</th>
                        <th>纬度</th>
                        <th>经度</th>
                        <th>海拔</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
            <div class="table-footer">共 ${originalPoints.length} 条记录</div>`;
        }

        function renderUnknownTable() {
            if (!unknownPoints || unknownPoints.length === 0) {
                return '<div class="table-empty">暂无无GPS照片数据</div>';
            }

            let rows = unknownPoints.map((p, idx) => {
                return `<tr>
                    <td>${idx + 1}</td>
                    <td><img src="${p.thumbnail_path || ''}" class="table-thumb" onerror="this.style.display='none'"></td>
                    <td>${p.filename || '-'}</td>
                    <td>${p.timestamp || '-'}</td>
                </tr>`;
            }).join('');

            return `<table class="data-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>缩略图</th>
                        <th>文件名</th>
                        <th>拍摄时间</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
            <div class="table-footer">共 ${unknownPoints.length} 条记录</div>`;
        }

        function renderConvertedTable() {
            if (!trackPoints || trackPoints.length === 0) {
                return '<div class="table-empty">暂无数据</div>';
            }

            let rows = trackPoints.map((p, idx) => {
                const place = p.place_name || '-';
                const address = p.address || '-';
                const admin = p.administrative ? `${p.administrative.province || ''}${p.administrative.city || ''}${p.administrative.district || ''}` : '-';
                const lat = p.latitude_tran ? p.latitude_tran.toFixed(5) : '-';
                const lng = p.longitude_tran ? p.longitude_tran.toFixed(5) : '-';
                const day = p.day_segment || 1;
                const count = p.photo_count || (p.photo ? p.photo.length : 0);

                // 缩略图（显示该点的第一张照片）
                let thumbHtml = '';
                if (p.photo && p.photo.length > 0) {
                    thumbHtml = `<img src="${p.photo[0].thumbnail_path || ''}" class="table-thumb" onerror="this.style.display='none'">`;
                }

                return `<tr onclick="goToPoint(${idx})">
                    <td>${idx + 1}</td>
                    <td>${thumbHtml}</td>
                    <td>${place}</td>
                    <td>${address}</td>
                    <td>${admin}</td>
                    <td>${lat}</td>
                    <td>${lng}</td>
                    <td>第${day}天</td>
                    <td>${count}张</td>
                </tr>`;
            }).join('');

            return `<table class="data-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>缩略图</th>
                        <th>地点</th>
                        <th>地址</th>
                        <th>行政区</th>
                        <th>纬度</th>
                        <th>经度</th>
                        <th>天数</th>
                        <th>照片数</th>
                    </tr>
                </thead>
                <tbody>${rows}</tbody>
            </table>
            <div class="table-footer">共 ${trackPoints.length} 条记录</div>`;
        }

        function highlightPoint(index) {
            // 高亮原始数据点（通过轨迹点查找对应位置）
            // 这里简单起见，直接跳转到地图中心
            const p = originalPoints[index];
            if (p && p.latitude && p.longitude) {
                map.setCenter([p.longitude, p.latitude]);
                map.setZoom(14);
            }
        }

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            // 忽略输入框等元素上的按键
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

            const isPreviewActive = document.getElementById('photoPreview').classList.contains('active');

            // 照片预览打开时阻止事件传到地图
            if (isPreviewActive) {
                e.stopImmediatePropagation();
            }

            switch(e.key) {
                case ' ':  // Space: 播放/暂停
                    e.preventDefault();
                    animToggle();
                    break;
                case 'ArrowLeft':  // ←: 上一张
                    e.preventDefault();
                    if (isPreviewActive) {
                        previewPrev();
                    }
                    break;
                case 'ArrowRight':  // →: 下一张
                    e.preventDefault();
                    if (isPreviewActive) {
                        previewNext();
                    }
                    break;
                case 'Escape':  // Esc: 关闭浮层/预览
                    e.preventDefault();
                    if (document.getElementById('photoPreview').classList.contains('active')) {
                        closePhotoPreview();
                    } else if (document.getElementById('leftPanel').classList.contains('active')) {
                        closeLeftPanel();
                    } else if (document.getElementById('tripDetailsPanel').style.display !== 'none') {
                        closeTripDetails();
                    } else if (document.getElementById('dataTablePanel').classList.contains('active')) {
                        closeDataTable();
                    } else if (document.getElementById('rightPanel').classList.contains('active')) {
                        closeRightPanel();
                    } else if (document.getElementById('legend').classList.contains('active')) {
                        closeLegend();
                    }
                    break;
            }
        });

        // 初始化
        if (typeof AMap === 'undefined') {
            document.getElementById('loading').innerHTML =
                '<p style="color:#ff6b6b;">地图加载失败，请检查网络和 API Key</p>';
        } else {
            document.getElementById('rightPanel').classList.add('active');
            document.getElementById('legend').classList.add('active');
            initTheme();  // 初始化主题
            loadData();
        }
    </script>

    <!-- 数据表格面板 -->
    <div class="data-table-panel common-panel common-panel-lg" id="dataTablePanel">
        <div class="data-table-header common-panel-header">
            <span>数据表格</span>
            <button class="data-table-close common-panel-close" onclick="closeDataTable()">×</button>
        </div>
        <div class="data-table-tabs">
            <button class="table-tab active" data-type="original" onclick="switchTable('original')">原始数据</button>
            <button class="table-tab" data-type="unknown" onclick="switchTable('unknown')">未知位置</button>
            <button class="table-tab" data-type="converted" onclick="switchTable('converted')">转换后数据</button>
        </div>
        <div class="data-table-content common-panel-body" id="dataTableContent">
            <!-- 动态内容 -->
        </div>
    </div>

    <!-- 海拔浮窗 -->
    <div class="altitude-panel common-panel common-panel-altitude common-panel-header-flat" id="altitudePanel">
        <div class="altitude-header common-panel-header">
            <span>海拔变化</span>
            <div class="altitude-toggle" id="altitudeToggle">
                <button class="toggle-btn active" data-mode="day" onclick="setAltitudeMode('day')">按天</button>
                <button class="toggle-btn" data-mode="point" onclick="setAltitudeMode('point')">按坐标点</button>
            </div>
            <!-- <button class="altitude-close common-panel-close" onclick="closeAltitudePanel()">×</button> -->
            <button class="data-table-close common-panel-close" onclick="closeAltitudePanel()">×</button>
        </div>
        <div class="altitude-chart common-panel-body" id="altitudeChart"></div>
    </div>

    <!-- 海拔悬浮球 -->
    <div class="altitude-float-btn floating-btn floating-btn-right" id="altitudeFloatBtn" onclick="showAltitudePanel()">
        <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/>
        </svg>
    </div>
</body>
