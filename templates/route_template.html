<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>路书 RoadBook - 路径规划</title>
    <link rel="icon" href="{{ static_base }}static/assets/favicon-48.png" type="image/png">
    <link rel="stylesheet" href="{{ static_base }}static/common.css">
    <link rel="stylesheet" href="{{ static_base }}static/route.css">
</head>
<body>
    <div class="header">
        <div class="header-brand">
            <a href="/"><img src="{{ static_base }}static/assets/favicon-48.png" alt="icon" class="header-icon-img"></a>
            <a href="/"><h1>路书 <span class="title-en">RoadBook</span></h1></a>
            <nav class="header-nav">
                <a href="/">首页</a>
                <a href="/photo-track">照片轨迹</a>
                <a href="/route">路径规划</a>
                <a href="/roadbook">AI路书</a>
            </nav>
            <span id="importInfo" class="import-info" style="display:none;">从路书【概要】导入</span>
        </div>
        <div class="header-right">
            <button class="theme-toggle" id="themeToggle" title="切换主题">
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
            <div class="header-github" id="headerGithub">
                <a href="https://github.com/zangnan/roadbook" target="_blank" title="GitHub">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12z"/>
                    </svg>
                </a>
            </div>
        </div>
    </div>

    <!-- 每日路径切换面板 -->
    <div id="daily-route-panel" class="daily-panel common-panel common-panel-daily hidden">
        <div class="daily-panel-header common-panel-header" onclick="toggleDailyPanel()">
            <span id="current-day-title">选择日期</span>
            <button class="common-panel-close" onclick="hideDailyPanel()">×</button>
        </div>
        <div id="daily-route-list" class="daily-panel-list"></div>
    </div>

    <!-- 日期切换悬浮球 -->
    <div class="daily-float-btn floating-btn floating-btn-left" id="dailyFloatBtn" onclick="toggleFloatBall('daily')">
        <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-1.99.9-1.99 2L3 19c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11zM9 10H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2zm-8 4H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/>
        </svg>
    </div>

    <div class="main-container">
        <!-- 中间地图 -->
        <div class="map-container">
            <div id="map"></div>
            <div class="loading" id="loading">
                <div class="loading-spinner"></div>
                <p>地图加载中...</p>
            </div>
        </div>
    </div>

    <!-- 左侧地点列表 - 浮层 -->
    <div class="floating-panel location-panel common-panel common-panel-left" id="locationPanel">
        <div class="floating-panel-header common-panel-header">
            <span class="panel-title">地点列表</span>
            <button class="common-panel-close" onclick="hideLocationPanel()">×</button>
        </div>
        <div class="floating-panel-content common-panel-body">
            <div class="location-list-compact" id="locationList">
                <!-- 动态生成 -->
            </div>
            <button class="btn-add-compact" id="btnAddWaypoint" onclick="addWaypoint()">
                <svg viewBox="0 0 24 24" width="12" height="12"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                添加途经点
            </button>
            <button class="btn-plan" id="btnPlan" onclick="planRoute()">
                <svg viewBox="0 0 24 24" width="16" height="16"><path fill="currentColor" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                开始规划
            </button>
        </div>
    </div>

    <!-- 地点悬浮球 -->
    <div class="location-float-btn floating-btn floating-btn-left" id="locationFloatBtn" onclick="showLocationPanel()">
        <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
        </svg>
    </div>

    <!-- 右侧路线概览 - 浮层 -->
    <div class="floating-panel result-panel common-panel common-panel-result" id="resultPanel">
        <div class="floating-panel-header common-panel-header">
            <span class="panel-title" id="resultPanelTitle">路线概览</span>
            <button class="common-panel-close" onclick="hideResultPanel()">×</button>
        </div>
        <div class="floating-panel-content common-panel-body" id="resultContent">
            <div class="result-empty">输入地点后点击"开始规划"</div>
        </div>
    </div>

    <!-- 路线悬浮球 -->
    <div class="result-float-btn floating-btn floating-btn-right" id="resultFloatBtn" onclick="showResultPanel()">
        <svg viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/>
        </svg>
    </div>

    <!-- 搜索结果下拉 -->
    <div class="search-dropdown" id="searchDropdown">
        <div class="search-dropdown-content" id="searchDropdownContent"></div>
    </div>

    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key={{ amap_ak }}"></script>
    <script>
        // 全局状态
        let map;
        let locationMarkers = [];
        let routePolylines = [];
        let infoWindow;
        let currentRouteInfo = null;
        let selectedRouteOption = 0;  // 当前选中的路线方案索引

        // 交通方式
        let currentTransportMode = 'driving';
        let currentDrivingPlan = 'recommended';

        // 当前地点列表
        let locations = [];

        // 当前搜索相关
        let currentSearchInput = null;
        let searchTimeout = null;

        // 面板状态
        let panelStates = {
            location: 'expanded',
            result: 'expanded',
            daily: 'collapsed'
        };

        // 悬浮球映射
        const floatBallMap = {
            location: { panel: 'locationPanel', ball: 'locationFloatBtn' },
            result: { panel: 'resultPanel', ball: 'resultFloatBtn' },
            daily: { panel: 'daily-route-panel', ball: 'dailyFloatBtn' }
        };

        // 切换悬浮球展开/收起
        function toggleFloatBall(type) {
            const mapping = floatBallMap[type];
            const panel = document.getElementById(mapping.panel);

            if (panelStates[type] === 'expanded') {
                // 收起
                panelStates[type] = 'collapsed';
                panel.classList.add('collapsed');
            } else {
                // 展开
                panelStates[type] = 'expanded';
                panel.classList.remove('collapsed');
            }

            // 更新悬浮球状态
            updateFloatBalls();
        }

        // 隐藏/显示悬浮球
        function updateFloatBalls() {
            const locationBall = document.getElementById('locationFloatBtn');
            const resultBall = document.getElementById('resultFloatBtn');
            const dailyBall = document.getElementById('dailyFloatBtn');

            // 地点面板收起时显示悬浮球
            if (panelStates.location === 'collapsed') {
                locationBall.style.display = 'flex';
            } else {
                locationBall.style.display = 'none';
            }

            // 路线面板收起时显示悬浮球
            if (panelStates.result === 'collapsed') {
                resultBall.style.display = 'flex';
            } else {
                resultBall.style.display = 'none';
            }

            // 日期面板展开时显示悬浮球激活状态，收起时不显示
            if (panelStates.daily === 'expanded') {
                dailyBall.classList.add('active');
            } else {
                dailyBall.classList.remove('active');
            }
        }

        // 显示地点面板
        function showLocationPanel() {
            const panel = document.getElementById('locationPanel');
            panel.classList.remove('collapsed');
            panelStates.location = 'expanded';
            updateFloatBalls();
        }

        // 隐藏地点面板
        function hideLocationPanel() {
            const panel = document.getElementById('locationPanel');
            panel.classList.add('collapsed');
            panelStates.location = 'collapsed';
            updateFloatBalls();
        }

        // 显示结果面板
        function showResultPanel() {
            const panel = document.getElementById('resultPanel');
            panel.classList.remove('collapsed');
            panelStates.result = 'expanded';
            updateFloatBalls();
        }

        // 隐藏结果面板
        function hideResultPanel() {
            const panel = document.getElementById('resultPanel');
            panel.classList.add('collapsed');
            panelStates.result = 'collapsed';
            updateFloatBalls();
        }

        // 颜色映射
        const STRATEGY_COLORS = {
            'driving': '#0084ff',
            'walking': '#43a047',
            'riding': '#ff9800',
            'transit': '#9c27b0'
        };

        // 地图样式映射
        const MAP_STYLES = {
            'dark': 'amap://styles/dark',
            'light': 'amap://styles/light'
        };

        // 主题相关
        const THEME_KEY = 'theme';
        let currentTheme = 'dark';

        // 交通方式 SVG 图标
        const TRANSPORT_ICONS = {
            'driving': `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/><path d="M17 17m-2 0a2 2 0 1 0 4 0a2 2 0 1 0 -4 0"/><path d="M5 17h-2v-6l2 -5h9l4 5h1a2 2 0 0 1 2 2v4h-2m-4 0h-6m-6 -6h15m-6 0v-5"/></svg>`,
            'transit': `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="3" width="16" height="16" rx="2"/><path d="M4 11h16"/><path d="M12 3v8"/><path d="M8 19l-2 3"/><path d="M18 22l-2 -3"/><circle cx="8" cy="15" r="1"/><circle cx="16" cy="15" r="1"/></svg>`,
            'walking': `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="2"/><path d="M9 20l3 -6m-2 -3l2 3m-3 -6l-3 6"/><path d="M6 8l4 -2l4 2v4l-2 2"/></svg>`,
            'riding': `<svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="17" r="3"/><circle cx="19" cy="17" r="3"/><path d="M12 17v-7"/><path d="M8 17h4l3 -7l3 7"/></svg>`
        };

        // 地点标记 SVG 图标
        const LOCATION_ICON_SVG = `<svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;

        // 初始化
        function init() {
            // 检测桌面模式并隐藏 GitHub 图标
            var isDesktop = new URLSearchParams(window.location.search).get('desktop') === '1';
            if (isDesktop) document.body.classList.add('desktop-mode');

            // 设置导航高亮
            (function() {
                const path = window.location.pathname;
                const navLinks = document.querySelectorAll('.header-nav a');
                navLinks.forEach(link => {
                    link.classList.remove('active');
                    if (link.getAttribute('href') === path) {
                        link.classList.add('active');
                    }
                });
            })();

            // 初始化主题
            initTheme();
            addLocation('start');
            addLocation('end');
            renderLocationList();

            // 检查是否从路书导入
            checkRoadbookImport();

            // 更新悬浮球状态
            updateFloatBalls();
        }

        // 检查路书导入
        async function checkRoadbookImport() {
            const urlParams = new URLSearchParams(window.location.search);
            const fromRoadbook = urlParams.get('from_roadbook');

            if (fromRoadbook !== '1') return;

            const roadbookLocations = localStorage.getItem('roadbook_locations');
            const routeMode = localStorage.getItem('roadbook_route_mode') || 'summary';
            if (!roadbookLocations) return;

            try {
                const parsedLocations = JSON.parse(roadbookLocations);
                if (!parsedLocations || parsedLocations.length < 2) return;

                // 显示导入来源
                const importInfo = document.getElementById('importInfo');
                if (importInfo) {
                    const modeText = routeMode === 'detailed' ? '详情'
                        : routeMode === 'daily' ? '每日' : '概要';
                    importInfo.textContent = `从路书【${modeText}】导入`;
                    importInfo.style.display = 'inline-block';
                }

                // 每日模式：初始化每日面板
                if (routeMode === 'daily') {
                    initDailyRoutePanel();
                }

                // 清空现有地点
                locations.length = 0;

                // 构建地点列表
                parsedLocations.forEach((name, idx) => {
                    let type = 'waypoint';
                    if (idx === 0) type = 'start';
                    else if (idx === parsedLocations.length - 1) type = 'end';

                    locations.push({
                        id: Date.now() + idx,
                        name: name,
                        lng: null,
                        lat: null,
                        type: type
                    });
                });

                renderLocationList();

                // 逐个搜索地点坐标
                for (let i = 0; i < locations.length; i++) {
                    const loc = locations[i];
                    if (loc.name) {
                        await searchAndSetLocation(loc.id, loc.name);
                    }
                }

                // 搜索完成后自动规划
                setTimeout(() => {
                    const validLocations = locations.filter(l => l.lng && l.lat);
                    if (validLocations.length >= 2) {
                        planRoute();
                    }
                }, 1000);

            } catch (err) {
                console.error('路书导入失败:', err);
            }
        }

        // 搜索并设置地点坐标（带 localStorage 缓存）
        async function searchAndSetLocation(id, name) {
            const cacheKey = `rb_loc_cache_${name}`;

            // 1. 先查 localStorage 缓存
            const cachedLoc = localStorage.getItem(cacheKey);
            if (cachedLoc) {
                try {
                    const { name: cachedName, lng, lat } = JSON.parse(cachedLoc);
                    const loc = locations.find(l => l.id == id);
                    if (loc) {
                        loc.name = cachedName;
                        loc.lng = parseFloat(lng);
                        loc.lat = parseFloat(lat);
                        renderLocationList();
                        updateMapMarkers();
                    }
                    return;
                } catch (e) {
                    // 缓存数据损坏，清除
                    localStorage.removeItem(cacheKey);
                }
            }

            // 2. 缓存未命中，调 API
            try {
                const response = await fetch('/api/route/inputtips', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keywords: name })
                });

                const result = await response.json();

                if (result.status === '1' && result.tips && result.tips.length > 0) {
                    const tip = result.tips[0];
                    const [lng, lat] = tip.location.split(',');

                    const loc = locations.find(l => l.id == id);
                    if (loc) {
                        loc.name = tip.name;
                        loc.lng = parseFloat(lng);
                        loc.lat = parseFloat(lat);
                        renderLocationList();
                        updateMapMarkers();

                        // 3. 写入 localStorage 缓存（30天）
                        try {
                            localStorage.setItem(cacheKey, JSON.stringify({
                                name: tip.name,
                                lng: tip.location.split(',')[0],
                                lat: tip.location.split(',')[1]
                            }));
                        } catch (e) {
                            // localStorage 满时忽略
                        }
                    }
                }
            } catch (err) {
                console.error('搜索地点失败:', name, err);
            }
        }

        // 主题初始化
        function initTheme() {
            const savedTheme = localStorage.getItem(THEME_KEY);
            if (savedTheme) {
                currentTheme = savedTheme;
            }
            applyTheme(currentTheme);

            document.getElementById('themeToggle').addEventListener('click', toggleTheme);
        }

        // 切换主题
        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            applyTheme(currentTheme);
            localStorage.setItem(THEME_KEY, currentTheme);
        }

        // 应用主题
        function applyTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            if (map) {
                map.setMapStyle(MAP_STYLES[theme]);
            }
        }

        // ============================================
        // 每日路径切换功能
        // ============================================

        // 初始化每日面板
        function initDailyRoutePanel() {
            const routeMode = localStorage.getItem('roadbook_route_mode');
            if (routeMode !== 'daily') return;

            const dailyData = localStorage.getItem('roadbook_daily_data');
            if (!dailyData) return;

            const panel = document.getElementById('daily-route-panel');
            const itinerary = JSON.parse(dailyData);

            // 渲染日期列表
            renderDailyRouteList(itinerary);

            // 显示面板（使用 class 控制）
            panel.classList.remove('hidden');
            panelStates.daily = 'expanded';

            // 默认选中当前天
            const dayIndex = parseInt(localStorage.getItem('roadbook_day_index') || '0');
            highlightDailyItem(dayIndex);

            // 更新标题
            const dayTitle = localStorage.getItem('roadbook_day_title');
            if (dayTitle) {
                document.getElementById('current-day-title').textContent = dayTitle;
            }

            // 更新悬浮球状态
            updateFloatBalls();
        }

        // 渲染日期列表
        function renderDailyRouteList(itinerary) {
            const list = document.getElementById('daily-route-list');
            if (!list) return;

            list.innerHTML = itinerary.map((day, idx) => {
                const weekDay = getWeekDay(day.date);
                return `<div class="daily-panel-item" data-index="${idx}" onclick="switchDayRoute(${idx})">
                    <span>第${day.day_number}天 ${day.date} ${weekDay}</span>
                    <span>${day.distance_km || 0}km</span>
                </div>`;
            }).join('');
        }

        // 切换当天路径
        async function switchDayRoute(dayIndex) {
            const dailyData = localStorage.getItem('roadbook_daily_data');
            if (!dailyData) return;

            const itinerary = JSON.parse(dailyData);
            const day = itinerary[dayIndex];
            if (!day) return;

            // 获取当天路径
            const newLocations = getDayRouteLocations(day);
            if (newLocations.length < 2) {
                alert('该天路径地点不足');
                return;
            }

            // 保存新的当天数据
            localStorage.setItem('roadbook_day_index', dayIndex);
            localStorage.setItem('roadbook_day_title', `第${day.day_number}天 ${day.date} ${day.origin}→${day.destination}`);
            localStorage.setItem('roadbook_locations', JSON.stringify(newLocations));

            // 更新标题
            document.getElementById('current-day-title').textContent = `第${day.day_number}天 ${day.date}`;

            // 高亮选中项
            highlightDailyItem(dayIndex);

            // 清空全局 locations 并重新填充
            locations.length = 0;
            day.route_stops.forEach((stop, idx) => {
                if (stop.location) {
                    let type = 'waypoint';
                    if (idx === 0) type = 'start';
                    else if (idx === day.route_stops.length - 1) type = 'end';
                    locations.push({
                        id: Date.now() + idx,
                        name: stop.location,
                        lng: null,
                        lat: null,
                        type: type
                    });
                }
            });

            // 重新搜索并规划
            renderLocationList();
            clearLocationMarkers();
            clearMap();

            for (let i = 0; i < locations.length; i++) {
                const loc = locations[i];
                if (loc.name) {
                    await searchAndSetLocation(loc.id, loc.name);
                }
            }

            setTimeout(() => {
                const validLocations = locations.filter(l => l.lng && l.lat);
                if (validLocations.length >= 2) {
                    planRoute();
                }
            }, 500);
        }

        // 获取当天路径（不去重，只做基础过滤）
        function getDayRouteLocations(day) {
            if (!day.route_stops) return [];
            const locations = [];
            const added = new Set();
            day.route_stops.forEach(stop => {
                if (stop.location && !added.has(stop.location)) {
                    locations.push(stop.location);
                    added.add(stop.location);
                }
            });
            return locations;
        }

        // 展开/收缩面板
        function toggleDailyPanel() {
            const panel = document.getElementById('daily-route-panel');
            const isExpanded = panel.classList.toggle('expanded');
            panelStates.daily = isExpanded ? 'expanded' : 'collapsed';
            updateFloatBalls();
        }

        // 高亮选中项
        function highlightDailyItem(index) {
            document.querySelectorAll('.daily-panel-item').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });
        }

        // 获取星期几
        function getWeekDay(dateStr) {
            const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六'];
            try {
                const d = new Date(dateStr);
                return days[d.getDay()];
            } catch {
                return '';
            }
        }

        // 设置交通方式
        function setTransportMode(mode) {
            currentTransportMode = mode;
            // 更新按钮状态
            document.querySelectorAll('.transport-mode-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.mode === mode);
            });
            // 更新所有途经点的策略
            locations.forEach(loc => {
                if (loc.type === 'waypoint') {
                    loc.strategy = mode;
                }
            });
            // 重新渲染列表（移除策略图标）
            renderLocationList();
        }

        // 设置驾车策略
        function setDrivingPlan(plan) {
            currentDrivingPlan = plan;
            // 更新按钮状态（右侧面板的策略按钮）
            document.querySelectorAll('.result-strategy-bar .strategy-option-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.plan === plan);
            });
            // 自动重新规划
            if (currentRouteInfo) {
                planRoute();
            }
        }

        // 添加地点
        function addLocation(type) {
            const id = Date.now() + Math.random();
            locations.push({
                id: id,
                name: '',
                lng: null,
                lat: null,
                type: type,
                strategy: currentTransportMode
            });
        }

        // 添加途经点
        function addWaypoint() {
            if (locations.filter(l => l.type === 'waypoint').length >= 15) {
                alert('最多支持 15 个途经点');
                return;
            }
            const endIndex = locations.findIndex(l => l.type === 'end');
            const id = Date.now() + Math.random();
            locations.splice(endIndex, 0, {
                id: id,
                name: '',
                lng: null,
                lat: null,
                type: 'waypoint',
                strategy: currentTransportMode
            });
            renderLocationList();
        }

        // 删除地点
        function removeLocation(id) {
            const index = locations.findIndex(l => l.id == id);
            if (index === -1) return;

            const loc = locations[index];
            if (loc.type === 'start' || loc.type === 'end') {
                locations[index] = { ...loc, name: '', lng: null, lat: null };
            } else {
                locations.splice(index, 1);
            }
            renderLocationList();
            clearMap();
        }

        // 交换起终点
        function swapStartEnd() {
            const startLoc = locations.find(l => l.type === 'start');
            const endLoc = locations.find(l => l.type === 'end');

            if (!startLoc || !endLoc) return;

            const tempName = startLoc.name;
            const tempLng = startLoc.lng;
            const tempLat = startLoc.lat;

            startLoc.name = endLoc.name;
            startLoc.lng = endLoc.lng;
            startLoc.lat = endLoc.lat;

            endLoc.name = tempName;
            endLoc.lng = tempLng;
            endLoc.lat = tempLat;

            renderLocationList();
            updateMapMarkers();

            if (currentRouteInfo) {
                planRoute();
            }
        }

        // 切换面板展开/收起（通过面板上的按钮）
        function togglePanel(panelId) {
            const panel = document.getElementById(panelId);
            const btn = panel.querySelector('.btn-collapse .collapse-icon');

            // 从 panelId 转换为 type
            const typeMap = { locationPanel: 'location', resultPanel: 'result' };
            const type = typeMap[panelId];

            if (panelStates[type] === 'expanded') {
                panelStates[type] = 'collapsed';
                panel.classList.add('collapsed');
                btn.style.transform = 'rotate(180deg)';
            } else {
                panelStates[type] = 'expanded';
                panel.classList.remove('collapsed');
                btn.style.transform = 'rotate(0deg)';
            }

            // 更新悬浮球
            updateFloatBalls();
        }

        // 渲染地点列表 - 紧凑模式（无策略选择）
        function renderLocationList() {
            const list = document.getElementById('locationList');
            list.innerHTML = '';

            let waypointIndex = 1;
            locations.forEach((loc, idx) => {
                const item = document.createElement('div');
                item.className = `location-item-compact ${loc.type}`;

                // 类型图标
                let typeIcon = '';
                if (loc.type === 'start') {
                    typeIcon = '<span class="loc-icon start">起</span>';
                } else if (loc.type === 'end') {
                    typeIcon = '<span class="loc-icon end">终</span>';
                } else {
                    typeIcon = `<span class="loc-icon waypoint">${waypointIndex++}</span>`;
                }

                // 删除按钮
                let removeBtn = '';
                if (loc.type !== 'start') {
                    removeBtn = `<button class="btn-remove-compact" onclick="removeLocation('${loc.id}')" title="删除">×</button>`;
                }

                item.innerHTML = `
                    ${typeIcon}
                    <div class="loc-input-wrapper">
                        <input type="text" class="location-input-compact"
                            placeholder="${loc.type === 'start' ? '输入起点...' : loc.type === 'end' ? '输入终点...' : '输入途经点...'}"
                            value="${loc.name || ''}"
                            data-id="${loc.id}"
                            onfocus="handleInputFocus('${loc.id}', this)"
                            onblur="handleInputBlur()"
                            oninput="handleInputChange('${loc.id}', this)">
                    </div>
                    ${removeBtn}
                `;

                list.appendChild(item);
            });

            const waypointCount = locations.filter(l => l.type === 'waypoint').length;
            document.getElementById('btnAddWaypoint').disabled = waypointCount >= 15;
        }

        // 处理输入框焦点
        function handleInputFocus(id, input) {
            currentSearchInput = { id, input };
            if (input.value) {
                searchAddress(input.value, input);
            }
        }

        // 处理输入框失焦
        function handleInputBlur() {
            setTimeout(() => {
                hideSearchDropdown();
                currentSearchInput = null;
            }, 200);
        }

        // 处理输入变化
        function handleInputChange(id, input) {
            const value = input.value;
            const loc = locations.find(l => l.id == id);
            if (loc) {
                loc.name = value;
                loc.lng = null;
                loc.lat = null;
            }

            clearMap();
            updateMapMarkers();

            if (searchTimeout) clearTimeout(searchTimeout);
            if (value.length >= 2) {
                searchTimeout = setTimeout(() => {
                    searchAddress(value, input);
                }, 300);
            } else {
                hideSearchDropdown();
            }
        }

        // 搜索地址
        async function searchAddress(query, input) {
            if (!query || query.length < 2) return;

            try {
                const response = await fetch('/api/route/inputtips', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ keywords: query })
                });

                const result = await response.json();

                if (result.status === '1' && result.tips && result.tips.length > 0) {
                    const results = result.tips
                        .filter(tip => tip.location)
                        .map(tip => {
                            const [lng, lat] = tip.location.split(',');
                            return {
                                name: tip.name,
                                lng: parseFloat(lng),
                                lat: parseFloat(lat),
                                address: tip.district || tip.address || ''
                            };
                        });
                    showSearchDropdown(results, input, query);
                } else {
                    hideSearchDropdown();
                }
            } catch (err) {
                console.error('搜索失败:', err);
                hideSearchDropdown();
            }
        }

        // 显示搜索下拉
        function showSearchDropdown(results, input, query) {
            const dropdown = document.getElementById('searchDropdown');
            const content = document.getElementById('searchDropdownContent');

            if (results.length === 0) {
                content.innerHTML = `
                    <div class="search-empty">未找到结果，请尝试更详细的地址</div>
                    <a href="https://www.amap.com/search?query=${encodeURIComponent(query)}" target="_blank" class="search-more-link">
                        在高德地图中搜索「${query}」
                    </a>
                `;
            } else {
                const itemsHtml = results.map(r => `
                    <div class="search-item" onclick="selectAddress('${r.name.replace(/'/g, "\\'")}', ${r.lng}, ${r.lat})">
                        <div class="search-item-icon">${LOCATION_ICON_SVG}</div>
                        <div class="search-item-content">
                            <div class="search-item-name">${r.name}</div>
                            ${r.address ? `<div class="search-item-address">${r.address}</div>` : ''}
                        </div>
                    </div>
                `).join('');

                content.innerHTML = `
                    ${itemsHtml}
                    <a href="https://www.amap.com/search?query=${encodeURIComponent(query)}" target="_blank" class="search-more-link">
                        查看更多「${query}」的搜索结果 →
                    </a>
                `;
            }

            const rect = input.getBoundingClientRect();
            dropdown.style.top = rect.bottom + 'px';
            dropdown.style.left = rect.left + 'px';
            dropdown.style.width = Math.max(rect.width, 300) + 'px';
            dropdown.style.display = 'block';
        }

        // 隐藏搜索下拉
        function hideSearchDropdown() {
            document.getElementById('searchDropdown').style.display = 'none';
        }

        // 选择地址
        function selectAddress(name, lng, lat) {
            if (!currentSearchInput) return;

            const { id, input } = currentSearchInput;
            const loc = locations.find(l => l.id == id);

            if (loc) {
                loc.name = name;
                loc.lng = lng;
                loc.lat = lat;
                input.value = name;
            }

            hideSearchDropdown();
            updateMapMarkers();
        }

        // 更新地图标记
        function updateMapMarkers() {
            const validLocations = locations.filter(l => l.lng && l.lat);
            if (validLocations.length === 0) return;

            // 只为尚未标注的地点添加标记
            const existingIds = new Set(locationMarkers.map(m => m.getExtData()?.id));
            let newMarkers = [];

            validLocations.forEach((loc, idx) => {
                // 跳过已标注的地点
                if (existingIds.has(loc.id)) return;

                let color, label;

                if (loc.type === 'start') {
                    color = '#43a047';
                    label = '起';
                } else if (loc.type === 'end') {
                    color = '#f44336';
                    label = '终';
                } else {
                    color = '#0084ff';
                    label = String(idx + 1);
                }

                // 检测起点终点重叠
                let extraOffset = null;
                if (loc.type === 'end') {
                    const startLoc = locations.find(l => l.type === 'start');
                    if (startLoc && startLoc.lng === loc.lng && startLoc.lat === loc.lat) {
                        extraOffset = { x: 25, y: -25 };
                    }
                }

                const marker = createMarker(loc.lng, loc.lat, label, color, extraOffset);
                marker.setExtData({ id: loc.id });
                locationMarkers.push(marker);
                map.add(marker);
                newMarkers.push(marker);
            });

            // 如果有新标记则调整视野
            if (newMarkers.length > 0 && locationMarkers.length > 0) {
                map.setFitView(locationMarkers, false, [60, 60, 280, 60]);
            }
        }

        // 创建标记
        function createMarker(lng, lat, label, color, extraOffset) {
            const content = document.createElement('div');
            content.className = 'custom-marker';
            content.style.cssText = `
                background: ${color};
                color: white;
                padding: 4px 8px;
                border-radius: 4px;
                font-size: 12px;
                font-weight: bold;
                white-space: nowrap;
                box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            `;
            content.textContent = label;

            const offsetX = -20 + (extraOffset ? extraOffset.x : 0);
            const offsetY = -15 + (extraOffset ? extraOffset.y : 0);

            const marker = new AMap.Marker({
                position: [lng, lat],
                content: content,
                offset: new AMap.Pixel(offsetX, offsetY)
            });

            return marker;
        }

        // 清除地图
        function clearMap() {
            if (routePolylines.length > 0) {
                map.remove(routePolylines);
                routePolylines = [];
            }
            // locationMarkers 由 clearLocationMarkers() 清除，这里不处理
            document.getElementById('resultContent').innerHTML = '<div class="result-empty">输入地点后点击"开始规划"</div>';
            currentRouteInfo = null;
            selectedRouteOption = 0;
        }

        // 清除地点标记
        function clearLocationMarkers() {
            if (locationMarkers.length > 0) {
                map.remove(locationMarkers);
                locationMarkers = [];
            }
        }

        // 规划路线
        async function planRoute() {
            const validLocations = locations.filter(l => l.lng && l.lat);

            if (validLocations.length < 2) {
                alert('请至少输入起始地和目的地');
                return;
            }

            document.getElementById('btnPlan').disabled = true;
            document.getElementById('btnPlan').textContent = '规划中...';

            try {
                clearMap();

                // 构建路段信息
                const segments = [];
                for (let i = 0; i < validLocations.length - 1; i++) {
                    const from = validLocations[i];
                    const to = validLocations[i + 1];

                    const segment = {
                        from: { name: from.name, lng: from.lng, lat: from.lat },
                        to: { name: to.name, lng: to.lng, lat: to.lat },
                        strategy: currentTransportMode
                    };

                    // 驾车时使用单一策略 recommended.strategies[0]
                    segment.strategy_plan = 'recommended';

                    segments.push(segment);
                }

                const response = await fetch('/api/route/plan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ segments })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    currentRouteInfo = result;
                    selectedRouteOption = 0;  // 重置选中方案
                    renderRouteResult(result);
                    updateMapMarkers();  // 重新绘制地点标记
                } else {
                    alert('规划失败: ' + result.error);
                }

            } catch (err) {
                console.error('规划失败:', err);
                alert('规划失败: ' + err.message);
            } finally {
                document.getElementById('btnPlan').disabled = false;
                document.getElementById('btnPlan').textContent = '开始规划';
            }
        }

        // 渲染路线结果
        function renderRouteResult(result) {
            if (routePolylines.length > 0) {
                map.remove(routePolylines);
                routePolylines = [];
            }

            const segments = result.segments;

            // 绘制每段路线
            segments.forEach((seg, idx) => {
                const color = STRATEGY_COLORS[seg.strategy] || '#0084ff';
                const path = seg.path || [];

                if (path.length >= 2) {
                    const polyline = new AMap.Polyline({
                        path: path,
                        strokeColor: color,
                        strokeWeight: 8,
                        strokeOpacity: 0.9,
                        lineJoin: 'round',
                        outlineColor: '#ffffff',
                        outlineOpacity: 0.3
                    });
                    routePolylines.push(polyline);
                    map.add(polyline);
                }
            });

            if (routePolylines.length > 0) {
                map.setFitView(routePolylines, false, [60, 60, 280, 60]);
            }

            showRouteSummaryFromResult(result);
        }

        // 显示路线概览
        function showRouteSummaryFromResult(result) {
            const segments = result.segments;

            // 生成路线汇总卡片
            const totalDist = result.total_distance >= 1000
                ? (result.total_distance / 1000).toFixed(1) + '公里'
                : result.total_distance + '米';
            const totalDur = formatDuration(result.total_duration);

            // 生成路段详情
            let segmentsHtml = '';
            segments.forEach((seg, idx) => {
                const segDist = seg.distance >= 1000
                    ? (seg.distance / 1000).toFixed(1) + '公里'
                    : seg.distance + '米';
                const segDur = formatDuration(seg.duration);

                segmentsHtml += `
                    <div class="route-segment-item">
                        <div class="segment-route">${seg.from.name || '起点'} → ${seg.to.name || '终点'}</div>
                        <div class="segment-info">
                            <span class="segment-duration">约${segDur}</span>
                            <span class="segment-sep">|</span>
                            <span class="segment-distance">${segDist}</span>
                        </div>
                    </div>
                `;
            });

            document.getElementById('resultPanelTitle').textContent = '路线概览';
            document.getElementById('resultContent').innerHTML = `
                <div class="route-summary-card">
                    <div class="route-summary-header">总行程</div>
                    <div class="route-summary-info">
                        <span class="route-summary-duration">约${totalDur}</span>
                        <span class="route-summary-sep">|</span>
                        <span class="route-summary-distance">${totalDist}</span>
                    </div>
                </div>
                <div class="route-segments-list">
                    ${segmentsHtml}
                </div>
            `;
        }

        // 从 steps 中提取道路名称
        function extractRoadsFromSteps(steps) {
            const roads = [];
            if (!steps || !Array.isArray(steps)) return roads;

            steps.forEach(step => {
                const road = step.road;
                if (road && road.trim() && !roads.includes(road)) {
                    roads.push(road.trim());
                }
            });

            return roads;
        }

        // 切换路线方案
        function switchRouteOption(segmentIdx, optionIdx) {
            const result = currentRouteInfo;
            if (!result || !result.segments[segmentIdx]) return;

            const seg = result.segments[segmentIdx];
            const option = seg.options[optionIdx];
            if (!option) return;

            // 记录选中的方案索引
            selectedRouteOption = optionIdx;

            // 更新 segments 中的当前路径
            result.segments[segmentIdx].path = option.path;
            result.segments[segmentIdx].distance = option.distance;
            result.segments[segmentIdx].duration = option.duration;
            result.segments[segmentIdx].steps = option.steps;

            // 重新绘制（使用保存的索引渲染高亮）
            renderRouteResult(result);
        }

        // 格式化时长
        function formatDuration(seconds) {
            if (!seconds || seconds < 60) return '< 1分钟';
            if (seconds < 3600) return Math.round(seconds / 60) + '分钟';
            const hours = Math.floor(seconds / 3600);
            const mins = Math.round((seconds % 3600) / 60);
            return `${hours}小时${mins > 0 ? mins + '分钟' : ''}`;
        }

        // 返回配置页面
        function goToConfig() {
            window.location.href = '/';
        }

        // 初始化地图
        function initMap() {
            map = new AMap.Map('map', {
                zoom: 12,
                center: [116.397428, 39.90923],
                resizeEnable: true,
                mapStyle: MAP_STYLES[currentTheme]
            });

            document.getElementById('loading').style.display = 'none';

            infoWindow = new AMap.InfoWindow({
                isCustom: false,
                content: '',
                offset: new AMap.Pixel(0, -30)
            });

            updateMapMarkers();
        }

        // 页面加载完成后初始化
        window.onload = function() {
            if (typeof AMap === 'undefined') {
                document.getElementById('loading').innerHTML =
                    '<p style="color:#ff6b6b;">地图加载失败，请检查网络和 API Key</p>';
                return;
            }
            initMap();
            init();
        };
    </script>
</body>
</html>
