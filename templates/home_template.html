<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>路书 RoadBook - 首页</title>
    <link rel="icon" href="{{ static_base }}static/assets/favicon-48.png" type="image/png">
    <link rel="stylesheet" href="{{ static_base }}static/common.css">
    <link rel="stylesheet" href="{{ static_base }}static/style.css">
</head>
<body>
    <div class="header">
        <div class="header-brand">
            <img src="{{ static_base }}static/assets/favicon-48.png" alt="icon" class="header-icon-img">
            <h1>路书 <span class="title-en">RoadBook</span></h1>
            <nav class="header-nav">
                <a href="/">首页</a>
                <a href="/photo-track">照片轨迹</a>
                <a href="/route">路径规划</a>
                <a href="/roadbook">AI路书</a>
                <a href="/help">使用说明</a>
            </nav>
        </div>
        <div class="header-right">
            <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
                <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
            <div class="header-github" id="headerGithub">
                <a href="https://github.com/zangnan/roadbook" target="_blank" title="GitHub">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12z"/>
                    </svg>
                </a>
            </div>
        </div>
    </div>

    <!-- 动态背景层 -->
    <div class="bg-gradient"></div>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-grid"></div>

    <main class="home-main">
        <div class="hero-section">
            <h1 class="hero-title">路书 <span class="hero-title-en">RoadBook</span></h1>
            <p class="hero-subtitle">将旅行照片转化为交互式轨迹地图</p>
            <div class="hero-badges">
                <span class="badge">照片</span>
                <span class="badge">地图</span>
                <span class="badge">智能</span>
            </div>
        </div>

        <div class="feature-cards">
            <a href="/photo-track" onclick="navigateTo('/photo-track'); return false;" class="feature-card card-photo">
                <div class="feature-glow"></div>
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                </div>
                <h2>照片轨迹</h2>
                <p>从照片提取 GPS 信息，自动生成交互式轨迹地图</p>
                <span class="feature-tag">照片 → 轨迹地图</span>
            </a>

            <a href="/route" onclick="navigateTo('/route'); return false;" class="feature-card card-route">
                <div class="feature-glow"></div>
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                </div>
                <h2>路径规划</h2>
                <p>高德地图路线规划，智能规划出行路径</p>
                <span class="feature-tag">起点 → 终点</span>
            </a>

            <a href="/roadbook" onclick="navigateTo('/roadbook'); return false;" class="feature-card card-ai">
                <div class="feature-glow"></div>
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                        <line x1="8" y1="6" x2="16" y2="6"/>
                        <line x1="8" y1="10" x2="16" y2="10"/>
                        <line x1="8" y1="14" x2="12" y2="14"/>
                    </svg>
                </div>
                <h2>AI路书</h2>
                <p>AI 生成完整旅行行程，包含景点、住宿、餐饮推荐</p>
                <span class="feature-tag">AI 智能规划</span>
            </a>
        </div>
    </main>

    <script>
        // 检测桌面模式并隐藏 GitHub 图标
        (function() {
            const isDesktop = new URLSearchParams(window.location.search).get('desktop') === '1';
            if (isDesktop) document.body.classList.add('desktop-mode');
        })();

        // 设置导航高亮
        (function() {
            const path = window.location.pathname;
            const navLinks = document.querySelectorAll('.header-nav a');
            navLinks.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === path) {
                    link.classList.add('active');
                }
            });
        })();

        // 导航函数（桌面模式下使用 PyWebView 的 navigate，浏览器模式下使用 location.href）
        function navigateTo(url) {
            if (window.navigate) {
                // 桌面模式：使用 PyWebView 暴露的 navigate 函数
                window.navigate(url);
            } else {
                // 浏览器模式：使用原生导航
                window.location.href = url;
            }
        }

        // 主题切换
        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme') || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        // 初始化主题
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.body.setAttribute('data-theme', savedTheme);
        })();
    </script>
</body>
</html>
