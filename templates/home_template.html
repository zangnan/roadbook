<!DOCTYPE html>
<html lang="zh-CN">
<head>

<body>
    <div class="header">
        <div class="header-brand">
            <img src="{{ static_base }}static/assets/favicon-48.png" alt="icon" class="header-icon-img">
            <h1>路书 <span class="title-en">RoadBook</span></h1>
            <nav class="header-nav">
                <a href="/">首页</a>
                <a href="/photo-track">照片轨迹</a>
                <a href="/route">路径规划</a>
                <a href="/roadbook">AI路书</a>
                <a href="/footprint">足迹地图</a>
                <a href="/help">使用说明</a>
            </nav>
        </div>
        <div class="header-right">
            <div class="header-r-btn" onclick="toggleTheme()" title="切换主题">
                <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 24 24" class="rp-switch-appearance__icon rp-switch-appearance__icon--sun"><path fill="currentColor" d="m7.001 15.848-1.226 1.226a.58.58 0 0 0 0 .818.58.58 0 0 0 .818 0l1.226-1.226a.58.58 0 0 0 0-.818.58.58 0 0 0-.818 0m-.352-8.735a.584.584 0 0 0 .825-.825L6.237 5.051a.584.584 0 0 0-.825.825zM5.011 11.07h-1.75a.584.584 0 0 0 0 1.167h1.75c.324 0 .584-.26.584-.583a.585.585 0 0 0-.584-.584m7.003-5.835c.324 0 .584-.26.584-.584V2.9a.58.58 0 0 0-.584-.584.58.58 0 0 0-.583.583V4.65c0 .323.262.584.583.584m5.616 1.621 1.226-1.225a.58.58 0 0 0 0-.818.58.58 0 0 0-.818 0l-1.226 1.225a.58.58 0 0 0 0 .818.576.576 0 0 0 .818 0m3.138 4.214h-1.75a.58.58 0 0 0-.584.584c0 .324.26.584.583.584h1.751a.584.584 0 1 0 0-1.167m-3.389 5.124a.584.584 0 0 0-.825.825l1.238 1.238a.584.584 0 0 0 .825-.826zm-5.365-9.795a5.256 5.256 0 0 0-5.257 5.258 5.256 5.256 0 0 0 5.257 5.257 5.256 5.256 0 0 0 5.257-5.257 5.256 5.256 0 0 0-5.257-5.258m0 11.675a.58.58 0 0 0-.583.583v1.751a.582.582 0 1 0 1.167 0v-1.75a.584.584 0 0 0-.584-.584"></path></svg>
                <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="19" height="19" fill="currentColor" viewBox="0 0 19 19" class="rp-switch-appearance__icon rp-switch-appearance__icon--moon"><path fill="currentColor" d="M9.166 0a9.2 9.2 0 0 1 1.857.188.834.834 0 0 1 .042 1.623 4.47 4.47 0 1 0 5.457 5.457l.048-.135a.834.834 0 0 1 1.575.177q.186.902.188 1.856A9.168 9.168 0 1 1 9.166 0"></path></svg>
            </div>
            <div class="header-r-btn" id="headerGithub">
                <a href="https://github.com/zangnan/roadbook" target="_blank" title="GitHub">
                    <svg viewBox="64 64 896 896" focusable="false" data-icon="github" width="1em" height="1em" fill="currentColor" aria-hidden="true"><path d="M511.6 76.3C264.3 76.2 64 276.4 64 523.5 64 718.9 189.3 885 363.8 946c23.5 5.9 19.9-10.8 19.9-22.2v-77.5c-135.7 15.9-141.2-73.9-150.3-88.9C215 726 171.5 718 184.5 703c30.9-15.9 62.4 4 98.9 57.9 26.4 39.1 77.9 32.5 104 26 5.7-23.5 17.9-44.5 34.7-60.8-140.6-25.2-199.2-111-199.2-213 0-49.5 16.3-95 48.3-131.7-20.4-60.5 1.9-112.3 4.9-120 58.1-5.2 118.5 41.6 123.2 45.3 33-8.9 70.7-13.6 112.9-13.6 42.4 0 80.2 4.9 113.5 13.9 11.3-8.6 67.3-48.8 121.3-43.9 2.9 7.7 24.7 58.3 5.5 118 32.4 36.8 48.9 82.7 48.9 132.3 0 102.2-59 188.1-200 212.9a127.5 127.5 0 0138.1 91v112.5c.8 9 0 17.9 15 17.9 177.1-59.7 304.6-227 304.6-424.1 0-247.2-200.4-447.3-447.5-447.3z"></path></svg>
                </a>
            </div>
        </div>
    </div>

    <!-- 动态背景层 -->
    <div class="bg-gradient"></div>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-grid"></div>

    <main class="home-main">
        <div class="hero-section">
            <h1 class="hero-title">路书 <span class="hero-title-en">RoadBook</span></h1>
            <p class="hero-subtitle">将旅行照片转化为交互式轨迹地图</p>
            <div class="hero-badges">
                <span class="badge">照片</span>
                <span class="badge">地图</span>
                <span class="badge">智能</span>
            </div>
        </div>

        <div class="feature-cards">
            <a href="/photo-track" onclick="navigateTo('/photo-track'); return false;" class="feature-card card-photo">
                <div class="feature-glow"></div>
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <circle cx="8.5" cy="8.5" r="1.5"/>
                        <polyline points="21 15 16 10 5 21"/>
                    </svg>
                </div>
                <h2>照片轨迹</h2>
                <p>从照片提取 GPS 信息，自动生成交互式轨迹地图</p>
                <span class="feature-tag">照片 → 轨迹地图</span>
            </a>

            <a href="/route" onclick="navigateTo('/route'); return false;" class="feature-card card-route">
                <div class="feature-glow"></div>
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="2" y1="12" x2="22" y2="12"/>
                        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
                    </svg>
                </div>
                <h2>路径规划</h2>
                <p>高德地图路线规划，智能规划出行路径</p>
                <span class="feature-tag">起点 → 终点</span>
            </a>

            <a href="/roadbook" onclick="navigateTo('/roadbook'); return false;" class="feature-card card-ai">
                <div class="feature-glow"></div>
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
                        <line x1="8" y1="6" x2="16" y2="6"/>
                        <line x1="8" y1="10" x2="16" y2="10"/>
                        <line x1="8" y1="14" x2="12" y2="14"/>
                    </svg>
                </div>
                <h2>AI路书</h2>
                <p>AI 生成完整旅行行程，包含景点、住宿、餐饮推荐</p>
                <span class="feature-tag">AI 智能规划</span>
            </a>

            <a href="/footprint" onclick="navigateTo('/footprint'); return false;" class="feature-card card-footprint">
                <div class="feature-glow"></div>
                <div class="feature-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"/>
                        <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
                        <path d="M2 12h20"/>
                    </svg>
                </div>
                <h2>足迹地图</h2>
                <p>汇总所有旅行足迹，在世界地图上展示你去过的地方</p>
                <span class="feature-tag">我的足迹</span>
            </a>
        </div>
    </main>

    <script>
        // 检测桌面模式并隐藏 GitHub 图标
        (function() {
            const isDesktop = new URLSearchParams(window.location.search).get('desktop') === '1';
            if (isDesktop) document.body.classList.add('desktop-mode');
        })();

        // 设置导航高亮
        (function() {
            const path = window.location.pathname;
            const navLinks = document.querySelectorAll('.header-nav a');
            navLinks.forEach(link => {
                link.classList.remove('active');
                if (link.getAttribute('href') === path) {
                    link.classList.add('active');
                }
            });
        })();

        // 导航函数（桌面模式下使用 PyWebView 的 navigate，浏览器模式下使用 location.href）
        function navigateTo(url) {
            if (window.navigate) {
                // 桌面模式：使用 PyWebView 暴露的 navigate 函数
                window.navigate(url);
            } else {
                // 浏览器模式：使用原生导航
                window.location.href = url;
            }
        }

        // 主题切换
        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme') || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        // 初始化主题
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.body.setAttribute('data-theme', savedTheme);
        })();
    </script>
</body>
</html>
